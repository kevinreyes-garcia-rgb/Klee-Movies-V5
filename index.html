<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klee Movies | Streaming</title>
    <style>
        :root {
            --primary: #c86f8b;
            --primary-dark: #a0425f;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #1c1e21;
        }

        /* Login Centrado */
        #login-container {
            max-width: 400px;
            margin: 10vh auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header-branding img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); margin-bottom: 20px; }
        h2 { border-left: 5px solid var(--primary); padding-left: 15px; margin-top: 40px; }

        /* Grid de Videos */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        .video-item {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .video-item:hover { transform: translateY(-5px); }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            display: block;
        }

        .video-item p {
            padding: 15px;
            margin: 0;
            font-weight: 500;
            text-align: center;
        }

        /* Formularios */
        .password-form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .password-form button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .password-form button:hover { background: var(--primary-dark); }

        .error-msg { color: #ff4444; font-size: 0.9em; margin-top: 10px; min-height: 1em; }

        /* Sección Privada */
        #private-section {
            margin-top: 60px;
            padding: 30px;
            background: #fff3cd;
            border-radius: 20px;
            border: 2px dashed #ffeeba;
        }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="header-branding">
            <img src="https://files.catbox.moe/fdchtm.jpeg" alt="Logo">
        </div>
        <h1>Acceso Clientes</h1>
        <div class="password-form">
            <input type="text" id="g-user" placeholder="Usuario">
            <input type="password" id="g-pass" placeholder="Contraseña">
            <button onclick="login()">Entrar al Catálogo</button>
            <p id="g-error" class="error-msg"></p>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <header class="header-branding" style="text-align: center;">
            <img src="https://files.catbox.moe/evzvn4.jpeg" alt="Logo">
            <h1>Klee Movies Library</h1>
        </header>

        <section>
            <h2>Bocchi The Rock</h2>
            <div class="video-grid">
                <div class="video-item">
                    <video controls preload="metadata"><source src="https://files.catbox.moe/5h90ie.mp4" type="video/mp4"></video>
                    <p>Capítulo 1</p>
                </div>
                <div class="video-item">
                    <video controls preload="metadata"><source src="https://files.catbox.moe/raj6qu.mp4" type="video/mp4"></video>
                    <p>Capítulo 2</p>
                </div>
            </div>
        </section>

        <div id="private-section">
            <h2>🔒 Zona VIP (Owner)</h2>
            <div id="p-auth" class="password-form">
                <input type="text" id="p-user" placeholder="Admin User">
                <input type="password" id="p-pass" placeholder="Admin Pass">
                <button onclick="loginPrivate()">Desbloquear Videos</button>
                <p id="p-error" class="error-msg"></p>
            </div>

            <div id="p-content" style="display: none;">
                <div class="video-grid">
                    <div class="video-item">
                        <video controls><source src="https://files.catbox.moe/mx3d9h.mp4" type="video/mp4"></video>
                        <p>Clip Secreto 1</p>
                    </div>
                    <div class="video-item">
                        <video controls><source src="https://files.catbox.moe/9rhazg.mp4" type="video/mp4"></video>
                        <p>Clip Secreto 2</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración de acceso
        const CONFIG = {
            public: { u: "usuario", p: "usuario11" },
            owner: { u: "Klee", p: "Chizu8890" }
        };

        function login() {
            const u = document.getElementById('g-user').value;
            const p = document.getElementById('g-pass').value;
            if(u === CONFIG.public.u && p === CONFIG.public.p) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                document.getElementById('g-error').innerText = "Usuario o contraseña incorrectos";
            }
        }

        function loginPrivate() {
            const u = document.getElementById('p-user').value;
            const p = document.getElementById('p-pass').value;
            if(u === CONFIG.owner.u && p === CONFIG.owner.p) {
                document.getElementById('p-auth').style.display = 'none';
                document.getElementById('p-content').style.display = 'block';
            } else {
                document.getElementById('p-error').innerText = "Acceso denegado al Owner";
            }
        }
    </script>
</body>
</html>
